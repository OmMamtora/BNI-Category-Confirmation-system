<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submission Details</title>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="header-content">
        <div class="logo-container">
            <div class="logo-badge">BNI</div>
            <div class="logo-text">
                Lakshya
                <span>Category Clarity</span>
            </div>
        </div>
    </div>
</header>

<main>

    <div class="card">

        <div class="steps-container">
            <div class="step-node completed">✓</div>
            <div class="step-line active"></div>
            <div class="step-node completed">✓</div>
            <div class="step-line active"></div>
            <div class="step-node completed">✓</div>
        </div>

        <div class="card-header">
            <h2 class="card-title">Category Confirmation Details</h2>
            <p class="card-subtitle">
                View submitted category confirmation.
            </p>
        </div>

        <div class="form-group">
            <label class="form-label">Member Name</label>
            <input id="memberName" class="form-control" readonly>
        </div>

        <div class="form-group">
            <label class="form-label">Chapter Name</label>
            <input id="chapterName" class="form-control" readonly>
        </div>

        <div class="form-group">
            <label class="form-label">Business Name</label>
            <input id="businessName" class="form-control" readonly>
        </div>

        <div class="form-group">
            <label class="form-label">Category Allotted</label>
            <input id="category" class="form-control" readonly>
        </div>

        <div class="form-group">
            <label class="form-label">This Will Include</label>
            <textarea id="includes" class="form-control" readonly></textarea>
        </div>

        <div class="form-group">
            <label class="form-label">This Will Not Include</label>
            <textarea id="excludes" class="form-control" readonly></textarea>
        </div>

        <div class="form-group">
            <label class="form-label">Specific Ask</label>
            <textarea id="specificAsk" class="form-control" readonly></textarea>
        </div>

        <div class="screen-footer">
            <button
                class="btn btn-outline"
                onclick="goBackToDashboard()">
                Back to Dashboard
            </button>
        </div>

    </div>

</main>

<script>

const submission = JSON.parse(
    sessionStorage.getItem('selectedSubmission')
);

if (!submission) {
    alert('No submission found');
    window.location.href = 'index.html';
}

    document.getElementById('memberName').value = submission.memberName || '';

    document.getElementById('chapterName').value = submission.chapter || 'BNI Lakshya';

    document.getElementById('businessName').value = submission.businessName || '';

    document.getElementById('category').value = submission.category || '';

    document.getElementById('includes').value = submission.includes || '';

    document.getElementById('excludes').value = submission.excludes || '';

    document.getElementById('specificAsk').value = submission.specificAsk || '-';


function goBackToDashboard() {

    const tab = sessionStorage.getItem('returnTab') || 'confirmed';

    window.location.href = `index.html?screen=dashboard&tab=${tab}`;
}

document.querySelectorAll('input, textarea, select').forEach(field => {
      field.readOnly = true;
      if (field.tagName === 'SELECT') {
          field.disabled = true;
      }
});

</script>

</body>
</html>
